<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BioCopy — programmable monomers</title>
<style>
  :root {
    --bg: #0a0c12;
    --panel: rgba(18, 22, 32, 0.82);
    --panel-border: rgba(120, 140, 190, 0.18);
    --ink: #e7ecf6;
    --ink-dim: #9aa6c2;
    --accent: #6ea8fe;
    --accent-2: #f7768e;
    --track: rgba(120, 140, 190, 0.22);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body {
    background: radial-gradient(1200px 800px at 70% -10%, #131a2b 0%, var(--bg) 60%);
    color: var(--ink);
    font: 13px/1.45 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  #panel {
    position: fixed; top: 16px; left: 16px; width: 286px;
    max-height: calc(100vh - 32px);
    overflow-y: auto; overscroll-behavior: contain;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    backdrop-filter: blur(14px) saturate(1.2);
    -webkit-backdrop-filter: blur(14px) saturate(1.2);
    box-shadow: 0 18px 50px rgba(0,0,0,0.45);
    padding: 16px 16px 14px;
    user-select: none;
  }
  #panel::-webkit-scrollbar { width: 8px; }
  #panel::-webkit-scrollbar-thumb {
    background: rgba(120, 140, 190, 0.35); border-radius: 8px;
  }
  #panel { scrollbar-width: thin; scrollbar-color: rgba(120,140,190,0.35) transparent; }
  #panel h1 {
    font-size: 14px; font-weight: 650; letter-spacing: 0.2px;
    margin: 0 0 2px; display: flex; align-items: center; gap: 8px;
  }
  #panel h1 .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow: 0 0 12px var(--accent);
  }
  #panel .sub { color: var(--ink-dim); font-size: 11px; margin: 0 0 14px; }

  .field { margin: 11px 0; }
  .field .row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
  .field label { color: var(--ink-dim); font-size: 11.5px; letter-spacing: .2px; }
  .field .val { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--ink); }

  select {
    width: 100%; color: var(--ink); background: rgba(110,168,254,0.10);
    border: 1px solid rgba(110,168,254,0.30); border-radius: 9px;
    padding: 8px 9px; font-size: 12.5px; font-weight: 600; cursor: pointer;
    appearance: none; -webkit-appearance: none;
  }
  select:hover { background: rgba(110,168,254,0.18); }

  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; border-radius: 4px; background: var(--track);
    outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 15px; height: 15px; border-radius: 50%;
    background: var(--ink);
    border: 2px solid var(--accent);
    box-shadow: 0 2px 6px rgba(0,0,0,.5);
  }
  input[type=range]::-moz-range-thumb {
    width: 15px; height: 15px; border-radius: 50%;
    background: var(--ink); border: 2px solid var(--accent);
  }

  .buttons { display: flex; gap: 8px; margin-top: 14px; }
  button {
    flex: 1; cursor: pointer; color: var(--ink);
    background: rgba(110,168,254,0.14);
    border: 1px solid rgba(110,168,254,0.35);
    border-radius: 9px; padding: 9px 10px; font-size: 12.5px; font-weight: 600;
    transition: background .15s, transform .05s;
  }
  button:hover { background: rgba(110,168,254,0.24); }
  button:active { transform: translateY(1px); }
  button.secondary {
    background: rgba(120,140,190,0.10);
    border-color: rgba(120,140,190,0.28);
  }
  button.secondary:hover { background: rgba(120,140,190,0.2); }

  .toggles { display: flex; gap: 14px; margin-top: 12px; flex-wrap: wrap; }
  .toggles label { display: flex; align-items: center; gap: 6px; color: var(--ink-dim); cursor: pointer; }
  .toggles input { accent-color: var(--accent); }

  details { margin-top: 12px; border-top: 1px solid var(--panel-border); padding-top: 8px; }
  summary { cursor: pointer; color: var(--ink-dim); font-size: 11.5px; list-style: none; }
  summary::-webkit-details-marker { display: none; }
  summary::before { content: "▸ "; color: var(--accent); }
  details[open] summary::before { content: "▾ "; }

  /* Dynamic color legend: one row per ball kind, with a live count. */
  .legend { margin-top: 12px; border-top: 1px solid var(--panel-border); padding-top: 10px; }
  .legend .lrow { display: flex; align-items: center; gap: 7px; margin: 4px 0; color: var(--ink-dim); font-size: 11.5px; }
  .legend .sw { width: 12px; height: 12px; border-radius: 50%; box-shadow: 0 0 0 1px rgba(255,255,255,.12) inset; flex: 0 0 auto; }
  .legend .nm { flex: 1 1 auto; color: var(--ink); }
  .legend .ct { font-variant-numeric: tabular-nums; color: var(--ink-dim); }
  .legend .note { opacity: .7; margin-top: 6px; }

  #stats {
    position: fixed; bottom: 14px; left: 16px;
    color: var(--ink-dim); font-size: 11px; font-variant-numeric: tabular-nums;
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 9px; padding: 7px 11px; backdrop-filter: blur(10px);
  }
  #stats b { color: var(--ink); font-weight: 600; }
  #hint {
    position: fixed; bottom: 14px; right: 16px;
    font-size: 11px; text-align: right;
  }
  #hint .hint-dim { color: var(--ink-dim); opacity: .8; }
</style>
</head>
<body>
<div id="app"></div>

<div id="panel">
  <h1><span class="dot"></span> BioCopy</h1>
  <p class="sub">Programmable monomers — each ball runs a little program that binds, builds, and copies.</p>

  <div class="field">
    <div class="row"><label for="scenario">Scenario</label></div>
    <select id="scenario"></select>
  </div>

  <div class="buttons">
    <button id="run">Run scenario</button>
    <button id="reload" class="secondary">Reload program</button>
  </div>

  <div class="legend" id="legend">
    <div class="note">Load a program to populate the legend.</div>
  </div>

  <details>
    <summary>Physics</summary>

    <div class="buttons" style="margin-top:10px">
      <button id="pause" class="secondary">Pause</button>
    </div>

    <div class="toggles">
      <label><input type="checkbox" id="shadows" checked /> Shadows</label>
      <label><input type="checkbox" id="showBonds" /> Bonds</label>
      <label><input type="checkbox" id="showContain" /> Boundary</label>
    </div>

    <div class="field" style="margin-top:10px">
      <div class="row"><label for="radius">Render radius</label><span class="val" id="radiusVal">1.00</span></div>
      <input type="range" id="radius" min="0.15" max="2.0" step="0.05" value="1.0" />
    </div>

    <div class="field">
      <div class="row"><label for="interact">Interact radius</label><span class="val" id="interactVal">1.00</span></div>
      <input type="range" id="interact" min="0.15" max="2.0" step="0.05" value="1.0" />
    </div>

    <div class="field">
      <div class="row"><label for="bondLen">Bond length (× interact r)</label><span class="val" id="bondLenVal">1.00</span></div>
      <input type="range" id="bondLen" min="0.4" max="2.0" step="0.05" value="1.0" />
    </div>

    <div class="field">
      <div class="row"><label for="containR">Boundary radius</label><span class="val" id="containRVal">40</span></div>
      <input type="range" id="containR" min="5" max="80" step="0.5" value="40" />
    </div>

    <div class="field">
      <div class="row"><label for="containK">Boundary push (beyond R)</label><span class="val" id="containKVal">0.05</span></div>
      <input type="range" id="containK" min="0" max="0.4" step="0.005" value="0.05" />
    </div>

    <div class="field">
      <div class="row"><label for="spring">Spring pull</label><span class="val" id="springVal">0.60</span></div>
      <input type="range" id="spring" min="0" max="2" step="0.02" value="0.6" />
    </div>
    <div class="field">
      <div class="row"><label for="collide">Collision push</label><span class="val" id="collideVal">1.00</span></div>
      <input type="range" id="collide" min="0" max="2" step="0.02" value="1.0" />
    </div>
    <div class="field">
      <div class="row"><label for="damp">Damping</label><span class="val" id="dampVal">0.90</span></div>
      <input type="range" id="damp" min="0.5" max="0.99" step="0.01" value="0.9" />
    </div>
    <div class="field">
      <div class="row"><label for="jiggle">Jiggle (thermal)</label><span class="val" id="jiggleVal">0.00</span></div>
      <input type="range" id="jiggle" min="0" max="3" step="0.05" value="0" />
    </div>
    <div class="field">
      <div class="row"><label for="speed">Sim substeps / frame</label><span class="val" id="speedVal">4</span></div>
      <input type="range" id="speed" min="1" max="40" step="1" value="4" />
    </div>
  </details>
</div>

<div id="stats">balls <b id="ballCount">0</b> · molecules <b id="molCount">0</b> · bonds <b id="bondCount">0</b> · <b id="fps">0</b> fps · <b id="mode">…</b></div>
<div id="hint"><span class="hint-dim">drag empty space to orbit · scroll to zoom · right-drag to pan</span></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ===========================================================================
// BioCopy — a soup of programmable monomers.
//
// Balls are no longer a fixed HEAD/BODY/TAIL chain; their kinds, bond slots and
// behavior are *specified* by a small DSL (see copy.prog). Each ball has:
//   • a kind (a string name → a deterministic color),
//   • a state register,
//   • named, directed bond slots (the VM navigates them: original.next, copy …),
//   • a program (a list of actions it executes: bind / release / .kind= / go …).
// A scenario declares which balls to create. The physics core is generic: springs
// run along an undirected bond adjacency, collisions skip directly-bonded pairs
// (K is fixed at 1). The whole thing still offloads to WebGPU, with a CPU fallback.
// ===========================================================================

// ---------------------------------------------------------------------------
// Scene setup (carried over from the previous look & feel; no gravity/floor).
// ---------------------------------------------------------------------------
const appEl = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
appEl.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const BG = 0x6a6f78;
scene.background = new THREE.Color(BG);
scene.fog = new THREE.FogExp2(BG, 0.004);

const simGroup = new THREE.Group();
scene.add(simGroup);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 8, 52);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 4;
controls.maxDistance = 260;
controls.target.set(0, 0, 0);

scene.add(new THREE.HemisphereLight(0xcdd8f2, 0x05070c, 0.4));
scene.add(new THREE.AmbientLight(0xffffff, 0.12));
const keyDirs = [
  { color: 0xffffff, intensity: 3.0, pos: [ 12,  18,  12] },
  { color: 0xbcd0ff, intensity: 0.75, pos: [-14,  -2,  -5] },
  { color: 0x88aaff, intensity: 1.15, pos: [ -7,   9, -16] },
];
let keyLight = null;
keyDirs.forEach((d, idx) => {
  const light = new THREE.DirectionalLight(d.color, d.intensity);
  light.position.set(...d.pos);
  scene.add(light);
  if (idx === 0) keyLight = light;
});
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.near = 1;
keyLight.shadow.camera.far = 90;
keyLight.shadow.camera.left = -30;
keyLight.shadow.camera.right = 30;
keyLight.shadow.camera.top = 30;
keyLight.shadow.camera.bottom = -30;
keyLight.shadow.bias = -0.0004;
keyLight.shadow.normalBias = 0.06;

const containSphere = new THREE.Mesh(
  new THREE.SphereGeometry(1, 32, 16),
  new THREE.MeshBasicMaterial({ color: 0x6ea8fe, wireframe: true, transparent: true, opacity: 0.06 })
);
containSphere.visible = false;
simGroup.add(containSphere);

// ---------------------------------------------------------------------------
// Capacities and tunables
// ---------------------------------------------------------------------------
const MAX_BALLS = 40000;          // headroom for the GPU path (CPU stays well below)
const MAX_SLOTS = 8;              // distinct named bond slots a program may use
const MAX_NBR   = 8;              // physics adjacency width (bonds per ball)

// Behavior constants (will eventually be specified per-program, not in the UI).
const SWIM_ACCEL = 0.60;          // steady seek thrust a ball applies toward a bind target
const NEAR_BIAS  = 0.20;          // prefer nearer candidates when finding a ball by kind
const VM_BUDGET  = 64;            // max instructions a ball runs per frame (guards go-loops)

const cfg = {
  radius: 1.0,          // render radius (cosmetic)
  interact: 1.0,        // interaction radius: collisions push apart within 2·interact
  bondLen: 1.0,         // bonded-center rest length as a factor of interact radius
  containR: 40,         // soft boundary radius
  containK: 0.05,       // boundary push strength
  spring: 0.6,
  collide: 1.0,
  damp: 0.9,
  jiggle: 0,            // thermal kick (off by default)
  substeps: 4,
  paused: false,
  showBonds: false,
  showContain: false,
  shadows: true,
};

// ---------------------------------------------------------------------------
// Deterministic color per kind name (FNV-1a hash → HSL). Stable across runs.
// ---------------------------------------------------------------------------
const kindColorCache = new Map();
function kindColor(name) {
  let c = kindColorCache.get(name);
  if (c) return c;
  let h = 2166136261 >>> 0;
  for (let i = 0; i < name.length; i++) { h ^= name.charCodeAt(i); h = Math.imul(h, 16777619) >>> 0; }
  const hue = (h % 360) / 360;
  const sat = 0.50 + ((h >>> 10) % 35) / 100;   // 0.50 .. 0.85
  const lit = 0.48 + ((h >>> 18) % 22) / 100;   // 0.48 .. 0.70
  c = new THREE.Color().setHSL(hue, sat, lit);
  kindColorCache.set(name, c);
  return c;
}

// ---------------------------------------------------------------------------
// Per-ball state (fixed-capacity flat arrays). Balls are created at spawn and
// never destroyed during a run, so every index is stable for the run's lifetime.
// ---------------------------------------------------------------------------
let pos = new Float32Array(MAX_BALLS * 3);
let vel = new Float32Array(MAX_BALLS * 3);
const kindId  = new Int32Array(MAX_BALLS);                 // index into kindList
const stateId = new Int32Array(MAX_BALLS);                 // index into stateNames
const bond = new Int32Array(MAX_BALLS * MAX_SLOTS).fill(-1); // directed slots (VM-facing)
const nbr  = new Int32Array(MAX_BALLS * MAX_NBR).fill(-1);   // undirected adjacency (physics)
const seekTarget = new Int32Array(MAX_BALLS).fill(-1);     // ball this one is swimming toward, or -1
let ballCount = 0;
let colorsDirty = true;
let statsDirty = true;
let gpuBondsDirty = false;        // nbr changed → re-upload before next GPU step

// Per-ball VM state (only "active" balls — those whose kind has a program — run).
const VM_RUN = 0, VM_SWIM = 1, VM_SLEEP = 2;
const pc = new Int32Array(MAX_BALLS).fill(-1);
const vmStatus = new Uint8Array(MAX_BALLS);
const vmSleepUntil = new Float64Array(MAX_BALLS);
const bindOwner = new Int32Array(MAX_BALLS).fill(-1);
const bindSlot  = new Int32Array(MAX_BALLS).fill(-1);
const bindTarget = new Int32Array(MAX_BALLS).fill(-1);
const bindWantKind = new Int32Array(MAX_BALLS).fill(-1);   // kindFind binds lock onto this kind
const inActive = new Uint8Array(MAX_BALLS);
let activeList = [];

// ---------------------------------------------------------------------------
// Parsed program tables (rebuilt by parseProgram)
// ---------------------------------------------------------------------------
let kinds = new Map();            // name -> { name, parent, slots:Map, program:[instr]|null }
let kindList = [];                // kindId -> name
let kindIndex = new Map();        // name -> kindId
let slotIndex = new Map();        // slot name -> global slot id
let slotNames = [];               // slot id -> name
let stateIndex = new Map();       // state name -> id
let stateNames = [];              // state id -> name
let scenarios = new Map();        // name -> [scenario stmt]

// Render meshes
const ballGeo = new THREE.SphereGeometry(1, 18, 14);
const ballMat = new THREE.MeshStandardMaterial({ roughness: 0.5, metalness: 0.0 });
let instMesh = new THREE.InstancedMesh(ballGeo, ballMat, MAX_BALLS);
instMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
instMesh.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(MAX_BALLS * 3), 3);
instMesh.count = 0;
instMesh.castShadow = true;
instMesh.receiveShadow = true;
simGroup.add(instMesh);

const tmpColor = new THREE.Color();
let bondLines = null;

// ---------------------------------------------------------------------------
// DSL tokenizer + parser (see copy.prog for the language)
// ---------------------------------------------------------------------------
function tokenize(src) {
  const toks = [];
  let i = 0; const n = src.length;
  const isIdStart = c => (c >= 'A' && c <= 'Z') || (c >= 'a' && c <= 'z') || c === '_';
  const isIdChar  = c => isIdStart(c) || (c >= '0' && c <= '9');
  const isDigit   = c => c >= '0' && c <= '9';
  while (i < n) {
    const c = src[i];
    if (c === '/' && src[i + 1] === '*') { i += 2; while (i < n && !(src[i] === '*' && src[i + 1] === '/')) i++; i += 2; continue; }
    if (c === '/' && src[i + 1] === '/') { i += 2; while (i < n && src[i] !== '\n') i++; continue; }
    if (c === ' ' || c === '\t' || c === '\r' || c === '\n') { i++; continue; }
    if (isIdStart(c)) { let j = i + 1; while (j < n && isIdChar(src[j])) j++; toks.push({ t: 'id', v: src.slice(i, j) }); i = j; continue; }
    if (isDigit(c)) { let j = i + 1; while (j < n && (isDigit(src[j]) || src[j] === '.')) j++; toks.push({ t: 'num', v: src.slice(i, j) }); i = j; continue; }
    if ((c === '!' || c === '=') && src[i + 1] === '=') { toks.push({ t: 'op', v: c + '=' }); i += 2; continue; }
    if ('{}()[];:=.|*'.indexOf(c) >= 0) { toks.push({ t: 'op', v: c }); i++; continue; }
    i++; // skip anything unexpected
  }
  return toks;
}

// Parse a full program: fills kinds/kindList/scenarios/etc. Throws on syntax error.
function parseProgram(src) {
  const toks = tokenize(src);
  let p = 0;
  const at = v => toks[p] && toks[p].v === v;
  const isId = () => toks[p] && toks[p].t === 'id';
  const expect = v => { if (!at(v)) throw new Error(`expected '${v}' but got '${toks[p] ? toks[p].v : 'EOF'}'`); return toks[p++]; };
  const expectId = () => { if (!isId()) throw new Error(`expected identifier but got '${toks[p] ? toks[p].v : 'EOF'}'`); return toks[p++].v; };

  function captureBraced() {
    expect('{');
    const start = p; let depth = 1;
    while (p < toks.length && depth > 0) {
      if (at('{')) depth++;
      else if (at('}')) { depth--; if (depth === 0) break; }
      p++;
    }
    const inner = toks.slice(start, p);
    expect('}');
    return inner;
  }
  function parseBallRaw() {
    const name = expectId();
    let parent = null;
    if (at(':')) { p++; parent = expectId(); }
    expect('{');
    const slotDecls = []; let actionToks = null;
    while (!at('}')) {
      if (at('{')) { actionToks = captureBraced(); }
      else {
        if (at('bond')) p++;            // optional 'bond' keyword
        const sName = expectId(); expect(':');
        const types = [expectId()];
        while (at('|')) { p++; types.push(expectId()); }
        expect(';');
        slotDecls.push({ name: sName, types });
      }
    }
    expect('}');
    if (at(';')) p++;
    return { name, parent, slotDecls, actionToks };
  }
  function parseScenRaw() {
    const name = expectId();
    const bodyToks = captureBraced();
    if (at(';')) p++;
    return { name, bodyToks };
  }

  // Pass A: structural
  const ballsRaw = [], scenRaw = [];
  while (p < toks.length) {
    if (at('ball')) { p++; ballsRaw.push(parseBallRaw()); }
    else if (at('scenario')) { p++; scenRaw.push(parseScenRaw()); }
    else throw new Error(`unexpected token '${toks[p].v}' at top level`);
  }

  // Build name tables
  kinds = new Map(); kindList = []; kindIndex = new Map();
  slotIndex = new Map(); slotNames = [];
  stateIndex = new Map(); stateNames = [];
  scenarios = new Map();
  stateNames.push('init'); stateIndex.set('init', 0);   // default state 0

  for (const b of ballsRaw) if (!kindIndex.has(b.name)) { kindIndex.set(b.name, kindList.length); kindList.push(b.name); }
  function getSlot(name) {
    if (!slotIndex.has(name)) {
      if (slotNames.length >= MAX_SLOTS) throw new Error(`too many distinct bond slots (max ${MAX_SLOTS}): '${name}'`);
      slotIndex.set(name, slotNames.length); slotNames.push(name);
    }
    return slotIndex.get(name);
  }
  function getState(name) {
    if (!stateIndex.has(name)) { stateIndex.set(name, stateNames.length); stateNames.push(name); }
    return stateIndex.get(name);
  }
  for (const b of ballsRaw) for (const s of b.slotDecls) getSlot(s.name);

  const rawByName = new Map(ballsRaw.map(b => [b.name, b]));
  function mergedSlots(name, seen) {
    seen = seen || new Set();
    const b = rawByName.get(name);
    if (!b || seen.has(name)) return new Map();
    seen.add(name);
    const m = b.parent ? mergedSlots(b.parent, seen) : new Map();
    for (const s of b.slotDecls) m.set(s.name, s.types);
    return m;
  }
  function inheritedActions(name) {
    const b = rawByName.get(name);
    if (!b) return null;
    if (b.actionToks) return b.actionToks;
    return b.parent ? inheritedActions(b.parent) : null;
  }

  // Compile a kind's action block into an instruction list.
  function compileActions(T, def) {
    let q = 0;
    const atA = v => T[q] && T[q].v === v;
    const isIdA = () => T[q] && T[q].t === 'id';
    const nextA = () => T[q++];
    const expectA = v => { if (!atA(v)) throw new Error(`[${def.name}] expected '${v}' got '${T[q] ? T[q].v : 'EOF'}'`); return T[q++]; };
    const expectIdA = () => { if (!isIdA()) throw new Error(`[${def.name}] expected id got '${T[q] ? T[q].v : 'EOF'}'`); return T[q++].v; };
    const ownSlots = def.slots;
    const isOwnSlot = id => ownSlots.has(id);
    const isKind = id => kindIndex.has(id);
    const instrs = [], labelMap = new Map(), gofix = [];

    function parseDotted() { const a = [expectIdA()]; while (atA('.')) { q++; a.push(expectIdA()); } return a; }
    function segs(ids) { return ids.map(getSlot); }
    function eatSemi() { if (atA(';')) q++; }

    function parseRhsForBind() {
      if (atA('release')) { q++; return { type: 'release' }; }
      const ids = parseDotted();
      if (ids.length === 1 && isKind(ids[0]) && !isOwnSlot(ids[0])) return { type: 'kindFind', kindId: kindIndex.get(ids[0]) };
      return { type: 'ref', segs: segs(ids) };
    }
    function parseKindVal() {
      const ids = parseDotted();
      if (ids[ids.length - 1] === 'kind') return { type: 'kindOf', segs: segs(ids.slice(0, -1)) };
      if (ids.length === 1 && isKind(ids[0])) return { type: 'kindLit', kindId: kindIndex.get(ids[0]) };
      return { type: 'kindOf', segs: segs(ids) };
    }
    function parseStateVal() {
      const ids = parseDotted();
      if (ids[ids.length - 1] === 'state') return { type: 'stateOf', segs: segs(ids.slice(0, -1)) };
      if (ids.length === 1) return { type: 'stateLit', stateId: getState(ids[0]) };
      return { type: 'stateOf', segs: segs(ids) };
    }
    function parseOperand() {
      const ids = parseDotted();
      const last = ids[ids.length - 1];
      if (last === 'kind') return { k: 'kindOf', segs: segs(ids.slice(0, -1)) };
      if (last === 'state') return { k: 'stateOf', segs: segs(ids.slice(0, -1)) };
      if (ids.length === 1 && isKind(ids[0])) return { k: 'kindLit', v: kindIndex.get(ids[0]) };
      if (ids.length === 1) return { k: 'stateLit', v: getState(ids[0]) };
      return { k: 'kindOf', segs: segs(ids) };
    }
    function parseCond() {
      const a = parseOperand();
      const opv = nextA().v;           // '==' or '!='
      const b = parseOperand();
      return { op: opv, a, b };
    }
    function parseOne() {
      if (atA('go')) { q++; const name = expectIdA(); const ins = { op: 'go', to: -1, name }; gofix.push(ins); eatSemi(); return ins; }
      if (atA('sleep')) {
        q++; const num = parseFloat(nextA().v); let ms = num * 1000;
        if (isIdA() && T[q].v === 'ms') { q++; ms = num; }
        else if (isIdA() && T[q].v === 's') { q++; ms = num * 1000; }
        eatSemi(); return { op: 'sleep', ms };
      }
      if (atA('if')) { q++; expectA('('); const cond = parseCond(); expectA(')'); const inner = parseOne(); return { op: 'if', cond, inner }; }
      const lhs = parseDotted(); expectA('=');
      const last = lhs[lhs.length - 1];
      if (last === 'kind') { const target = segs(lhs.slice(0, -1)); const value = parseKindVal(); eatSemi(); return { op: 'setkind', target, value }; }
      if (last === 'state') { const target = segs(lhs.slice(0, -1)); const value = parseStateVal(); eatSemi(); return { op: 'setstate', target, value }; }
      const slot = getSlot(last); const owner = segs(lhs.slice(0, -1));
      const rhs = parseRhsForBind(); eatSemi();
      if (rhs.type === 'release') return { op: 'release', owner, slot };
      return { op: 'bind', owner, slot, rhs };
    }

    while (q < T.length) {
      if (isIdA() && T[q + 1] && T[q + 1].v === ':') { const name = nextA().v; q++; labelMap.set(name, instrs.length); instrs.push({ op: 'label', name }); continue; }
      instrs.push(parseOne());
    }
    for (const g of gofix) { if (!labelMap.has(g.name)) throw new Error(`[${def.name}] unknown label '${g.name}'`); g.to = labelMap.get(g.name); }
    return instrs;
  }

  // Compile a scenario body into builder statements.
  function compileScenario(T) {
    let q = 0;
    const atS = v => T[q] && T[q].v === v;
    const isIdS = () => T[q] && T[q].t === 'id';
    const nextS = () => T[q++];
    function parseDotted() { const a = [expectIdSc()]; while (atS('.')) { q++; a.push(expectIdSc()); } return a; }
    function expectIdSc() { if (!isIdS()) throw new Error('[scenario] expected id'); return T[q++].v; }
    function segs(ids) { return ids.map(getSlot); }
    const stmts = [], vars = new Set();
    while (q < T.length) {
      const ids = parseDotted();
      if (atS('*')) {
        q++; const num = parseInt(nextS().v, 10);
        if (!kindIndex.has(ids[0])) throw new Error(`[scenario] unknown kind '${ids[0]}'`);
        stmts.push({ op: 'createMany', kid: kindIndex.get(ids[0]), n: num }); if (atS(';')) q++; continue;
      }
      if (atS('=')) {
        q++; const lhs = ids; const last = lhs[lhs.length - 1];
        if (last === 'kind' || last === 'state') {
          const ownerVar = lhs[0]; const ownerSegs = segs(lhs.slice(1, -1));
          const val = parseDotted();
          if (last === 'kind') {
            const vl = val[val.length - 1];
            const value = vl === 'kind' ? { type: 'kindOf', refVar: val[0], segs: segs(val.slice(1, -1)) }
                                        : { type: 'kindLit', kid: kindIndex.get(val[0]) };
            stmts.push({ op: 'setkind', ownerVar, ownerSegs, value });
          } else {
            const value = { type: 'stateLit', stateId: getState(val[0]) };
            stmts.push({ op: 'setstate', ownerVar, ownerSegs, value });
          }
          if (atS(';')) q++; continue;
        }
        const rhs = parseDotted();
        if (rhs.length === 1 && kindIndex.has(rhs[0]) && !vars.has(rhs[0])) {
          const kid = kindIndex.get(rhs[0]);
          if (lhs.length === 1) { vars.add(lhs[0]); stmts.push({ op: 'createAssign', var: lhs[0], kid }); }
          else { stmts.push({ op: 'createBond', ownerVar: lhs[0], ownerSegs: segs(lhs.slice(1, -1)), slot: getSlot(lhs[lhs.length - 1]), kid }); }
        } else if (lhs.length === 1) {
          vars.add(lhs[0]);                                   // var = ref  → navigate
          stmts.push({ op: 'assignRef', var: lhs[0], refVar: rhs[0], refSegs: segs(rhs.slice(1)) });
        } else {
          // owner.slot = existingVar  → bond to an already-created ball
          stmts.push({ op: 'bindVar', ownerVar: lhs[0], ownerSegs: segs(lhs.slice(1, -1)), slot: getSlot(lhs[lhs.length - 1]), refVar: rhs[0], refSegs: segs(rhs.slice(1)) });
        }
        if (atS(';')) q++; continue;
      }
      if (!kindIndex.has(ids[0])) throw new Error(`[scenario] unknown kind or statement '${ids[0]}'`);
      stmts.push({ op: 'createOne', kid: kindIndex.get(ids[0]) }); if (atS(';')) q++;
    }
    return stmts;
  }

  // Build kind defs, then compile programs and scenarios.
  for (const b of ballsRaw) kinds.set(b.name, { name: b.name, parent: b.parent, slots: mergedSlots(b.name), program: null });
  for (const b of ballsRaw) {
    const def = kinds.get(b.name);
    const acts = inheritedActions(b.name);
    if (acts && acts.length) def.program = compileActions(acts, def);
  }
  for (const s of scenRaw) scenarios.set(s.name, compileScenario(s.bodyToks));
}

// ---------------------------------------------------------------------------
// Geometry helpers
// ---------------------------------------------------------------------------
function randomInSphere(R) {
  const u = Math.random();
  const r = R * Math.cbrt(u);
  const cosT = 2 * Math.random() - 1;
  const sinT = Math.sqrt(1 - cosT * cosT);
  const phi = 2 * Math.PI * Math.random();
  return new THREE.Vector3(r * sinT * Math.cos(phi), r * sinT * Math.sin(phi), r * cosT);
}
function randomUnit() {
  const cosT = 2 * Math.random() - 1;
  const sinT = Math.sqrt(1 - cosT * cosT);
  const phi = 2 * Math.PI * Math.random();
  return new THREE.Vector3(sinT * Math.cos(phi), sinT * Math.sin(phi), cosT);
}

// ---------------------------------------------------------------------------
// Bonds: directed slots (VM) + undirected adjacency (physics), kept in sync.
// A physical bond a–b exists iff a references b in a slot OR b references a, so
// one-directional bonds (enzyme→substrate) still pull both ends symmetrically.
// ---------------------------------------------------------------------------
function refsBetween(a, b) { for (let s = 0; s < MAX_SLOTS; s++) if (bond[a * MAX_SLOTS + s] === b) return true; return false; }
function ensureNbr(a, b) {
  let hole = -1;
  for (let k = 0; k < MAX_NBR; k++) { const v = nbr[a * MAX_NBR + k]; if (v === b) return; if (v < 0 && hole < 0) hole = k; }
  if (hole >= 0) nbr[a * MAX_NBR + hole] = b; else console.warn('nbr overflow on ball', a);
}
function removeNbr(a, b) { for (let k = 0; k < MAX_NBR; k++) if (nbr[a * MAX_NBR + k] === b) { nbr[a * MAX_NBR + k] = -1; return; } }
function maybeDropUndirected(a, b) {
  if (!refsBetween(a, b) && !refsBetween(b, a)) { removeNbr(a, b); removeNbr(b, a); }
}
function setBond(owner, slot, target) {
  const old = bond[owner * MAX_SLOTS + slot];
  if (old === target) return;
  bond[owner * MAX_SLOTS + slot] = target;
  if (old >= 0) maybeDropUndirected(owner, old);
  if (target >= 0) { ensureNbr(owner, target); ensureNbr(target, owner); }
  colorsDirty = true; statsDirty = true; gpuBondsDirty = true;
}
function releaseBond(owner, slot) {
  const old = bond[owner * MAX_SLOTS + slot];
  if (old < 0) return;
  bond[owner * MAX_SLOTS + slot] = -1;
  maybeDropUndirected(owner, old);
  colorsDirty = true; statsDirty = true; gpuBondsDirty = true;
}
function setKind(i, kid) {
  if (kindId[i] === kid) return;
  kindId[i] = kid; colorsDirty = true; statsDirty = true;
  const def = kinds.get(kindList[kid]);
  if (def && def.program) { if (pc[i] < 0) initVM(i); }
  else { pc[i] = -1; vmStatus[i] = VM_RUN; seekTarget[i] = -1; }
}
function initVM(i) {
  pc[i] = 0; vmStatus[i] = VM_RUN; bindTarget[i] = -1; seekTarget[i] = -1; vmSleepUntil[i] = 0;
  if (!inActive[i]) { inActive[i] = 1; activeList.push(i); }
}

// ---------------------------------------------------------------------------
// Scenario spawning
// ---------------------------------------------------------------------------
let currentScenario = null;
function spawnScenario(name) {
  const sc = scenarios.get(name);
  if (!sc) { console.warn('no such scenario', name); return; }
  currentScenario = name;

  ballCount = 0;
  activeList = [];
  inActive.fill(0);
  bond.fill(-1); nbr.fill(-1); seekTarget.fill(-1); pc.fill(-1); vmStatus.fill(0);

  const R = Math.max(2, cfg.containR - 2 * cfg.interact);
  const L0 = cfg.bondLen * cfg.interact;
  const off = new THREE.Vector3();

  function createBall(kid, near) {
    if (ballCount >= MAX_BALLS) return -1;
    const i = ballCount++;
    kindId[i] = kid; stateId[i] = 0;
    let x, y, z;
    if (near != null && near >= 0) {
      off.copy(randomUnit()).multiplyScalar(L0);
      x = pos[near * 3] + off.x; y = pos[near * 3 + 1] + off.y; z = pos[near * 3 + 2] + off.z;
    } else { const v = randomInSphere(R); x = v.x; y = v.y; z = v.z; }
    pos[i * 3] = x; pos[i * 3 + 1] = y; pos[i * 3 + 2] = z;
    vel[i * 3] = vel[i * 3 + 1] = vel[i * 3 + 2] = 0;
    const def = kinds.get(kindList[kid]);
    if (def && def.program) initVM(i);
    return i;
  }

  const vars = new Map();
  const resolveVar = (name, segs) => {
    let b = vars.has(name) ? vars.get(name) : -1;
    for (let k = 0; k < segs.length && b >= 0; k++) b = bond[b * MAX_SLOTS + segs[k]];
    return b;
  };

  for (const s of sc) {
    switch (s.op) {
      case 'createMany': for (let k = 0; k < s.n; k++) createBall(s.kid, null); break;
      case 'createOne': createBall(s.kid, null); break;
      case 'createAssign': vars.set(s.var, createBall(s.kid, null)); break;
      case 'assignRef': vars.set(s.var, resolveVar(s.refVar, s.refSegs)); break;
      case 'createBond': {
        const owner = resolveVar(s.ownerVar, s.ownerSegs);
        if (owner < 0) { console.warn('[scenario] dangling owner for createBond'); break; }
        const i = createBall(s.kid, owner);
        setBond(owner, s.slot, i);
        break;
      }
      case 'bindVar': {
        const owner = resolveVar(s.ownerVar, s.ownerSegs);
        const target = resolveVar(s.refVar, s.refSegs);
        if (owner < 0 || target < 0) { console.warn('[scenario] dangling bindVar'); break; }
        setBond(owner, s.slot, target);
        break;
      }
      case 'setkind': {
        const owner = resolveVar(s.ownerVar, s.ownerSegs);
        if (owner < 0) break;
        const kid = s.value.type === 'kindLit' ? s.value.kid : kindId[resolveVar(s.value.refVar, s.value.segs)];
        setKind(owner, kid);
        break;
      }
      case 'setstate': {
        const owner = resolveVar(s.ownerVar, s.ownerSegs);
        if (owner >= 0) stateId[owner] = s.value.stateId;
        break;
      }
    }
  }

  colorsDirty = true; statsDirty = true; gpuBondsDirty = true;
  rebuildBondLines();
  refreshCounts();
  if (gpu) { gpu.uploadAll(ballCount); gpuBondsDirty = false; }
}

// ---------------------------------------------------------------------------
// Per-ball VM. Resolves bond-slot paths relative to `self`.
// ---------------------------------------------------------------------------
function resolvePath(self, segs) { let b = self; for (let k = 0; k < segs.length; k++) { b = bond[b * MAX_SLOTS + segs[k]]; if (b < 0) return -1; } return b; }
function dist2(a, b) { const dx = pos[a * 3] - pos[b * 3], dy = pos[a * 3 + 1] - pos[b * 3 + 1], dz = pos[a * 3 + 2] - pos[b * 3 + 2]; return dx * dx + dy * dy + dz * dz; }

// Weighted-random pick biased toward nearer balls (A-Res reservoir, weight=exp(-bias·d)).
function pickNearBiased(ex, ey, ez, pred) {
  let best = -1, bestKey = -1;
  for (let i = 0; i < ballCount; i++) {
    if (!pred(i)) continue;
    const dx = pos[i * 3] - ex, dy = pos[i * 3 + 1] - ey, dz = pos[i * 3 + 2] - ez;
    const w = Math.exp(-NEAR_BIAS * Math.sqrt(dx * dx + dy * dy + dz * dz));
    if (w <= 0) continue;
    const key = Math.pow(Math.random(), 1 / w);
    if (key > bestKey) { bestKey = key; best = i; }
  }
  return best;
}

function evalOperand(self, o) {
  if (o.k === 'kindLit') return o.v;
  if (o.k === 'stateLit') return o.v;
  const b = resolvePath(self, o.segs);
  if (b < 0) return -999;
  return o.k === 'kindOf' ? kindId[b] : stateId[b];
}
function evalCond(self, c) {
  const a = evalOperand(self, c.a), b = evalOperand(self, c.b);
  return c.op === '==' ? a === b : a !== b;
}

const bindDist = () => 2.4 * cfg.interact;

// Execute one instruction. Returns 'next' | 'jump' | 'block' | 'retry'.
function execInstr(self, ins, now) {
  switch (ins.op) {
    case 'label': return 'next';
    case 'go': pc[self] = ins.to; return 'jump';
    case 'sleep': vmStatus[self] = VM_SLEEP; vmSleepUntil[self] = now + ins.ms; pc[self]++; return 'block';
    case 'setkind': {
      const t = resolvePath(self, ins.target);
      if (t < 0) { logOnce(`${kindList[kindId[self]]}: setkind on missing ball`); return 'next'; }
      let kid;
      if (ins.value.type === 'kindLit') kid = ins.value.kindId;
      else { const r = resolvePath(self, ins.value.segs); if (r < 0) { logOnce(`${kindList[kindId[self]]}: kindOf missing ref`); return 'next'; } kid = kindId[r]; }
      setKind(t, kid); return 'next';
    }
    case 'setstate': {
      const t = resolvePath(self, ins.target);
      if (t < 0) return 'next';
      let sid;
      if (ins.value.type === 'stateLit') sid = ins.value.stateId;
      else { const r = resolvePath(self, ins.value.segs); if (r < 0) return 'next'; sid = stateId[r]; }
      stateId[t] = sid; return 'next';
    }
    case 'release': {
      const owner = resolvePath(self, ins.owner);
      if (owner < 0) return 'next';
      releaseBond(owner, ins.slot); return 'next';
    }
    case 'bind': {
      const owner = resolvePath(self, ins.owner);
      if (owner < 0) { logOnce(`${kindList[kindId[self]]}: bind on missing owner`); return 'next'; }
      let T, wantKind = -1;
      if (ins.rhs.type === 'kindFind') {
        wantKind = ins.rhs.kindId;
        T = pickNearBiased(pos[self * 3], pos[self * 3 + 1], pos[self * 3 + 2], i => i !== owner && kindId[i] === wantKind && bond[owner * MAX_SLOTS + ins.slot] !== i);
        if (T < 0) return 'retry';                 // nothing available yet — try again next frame
      } else {
        T = resolvePath(self, ins.rhs.segs);
        if (T < 0) { logOnce(`${kindList[kindId[self]]}: bind ref resolved to nothing`); return 'next'; }
      }
      const bd = bindDist();
      if (dist2(owner, T) <= bd * bd) { setBond(owner, ins.slot, T); return 'next'; }
      // too far → swim to it, then bind on arrival
      bindOwner[self] = owner; bindSlot[self] = ins.slot; bindTarget[self] = T; bindWantKind[self] = wantKind;
      seekTarget[self] = T; vmStatus[self] = VM_SWIM; return 'block';
    }
    case 'if': return evalCond(self, ins.cond) ? execInstr(self, ins.inner, now) : 'next';
  }
  return 'next';
}

function swimTick(self) {
  const owner = bindOwner[self], slot = bindSlot[self], want = bindWantKind[self];
  let T = bindTarget[self];
  let valid = T >= 0 && T < ballCount && owner >= 0 && owner < ballCount;
  if (valid && want >= 0 && kindId[T] !== want) valid = false;     // target changed identity
  if (!valid) { seekTarget[self] = -1; bindTarget[self] = -1; vmStatus[self] = VM_RUN; return; }
  seekTarget[self] = T;                                            // keep thrusting toward it
  const bd = bindDist();
  if (dist2(owner, T) <= bd * bd) {
    setBond(owner, slot, T);
    seekTarget[self] = -1; bindTarget[self] = -1; vmStatus[self] = VM_RUN;
    pc[self]++;                                                    // the blocking action completed
  }
}

function stepBall(self, now) {
  if (vmStatus[self] === VM_SLEEP) { if (now < vmSleepUntil[self]) return; vmStatus[self] = VM_RUN; }
  if (vmStatus[self] === VM_SWIM) { swimTick(self); return; }
  const def = kinds.get(kindList[kindId[self]]);
  const prog = def && def.program;
  if (!prog) { pc[self] = -1; return; }
  let budget = VM_BUDGET;
  while (budget-- > 0 && vmStatus[self] === VM_RUN) {
    let ip = pc[self];
    if (ip < 0 || ip >= prog.length) { pc[self] = -1; return; }
    const res = execInstr(self, prog[ip], now);
    if (res === 'block' || res === 'retry') return;
    if (res === 'next') pc[self] = ip + 1;
    // 'jump' already set pc
  }
}

let seekDirtyForGPU = false;
function updatePrograms(now) {
  if (!activeList.length) return;
  for (let e = 0; e < activeList.length; e++) stepBall(activeList[e], now);
  seekDirtyForGPU = true;   // seekTarget may have changed; push to GPU before next step
}

// Throttle noisy logs so a structural program bug doesn't flood the console.
const _loggedOnce = new Set();
function logOnce(msg) { if (!_loggedOnce.has(msg)) { _loggedOnce.add(msg); console.warn('[program]', msg); } }

// ---------------------------------------------------------------------------
// CPU physics (fallback). Springs along nbr; collisions skip directly-bonded
// pairs (K=1); jiggle; soft boundary; seek thrust toward bind targets; integrate.
// ---------------------------------------------------------------------------
const hashGrid = new Map();
function gridKey(ix, iy, iz) { return ix + ',' + iy + ',' + iz; }
const force = new Float32Array(MAX_BALLS * 3);

function isBonded(i, j) { for (let k = 0; k < MAX_NBR; k++) if (nbr[i * MAX_NBR + k] === j) return true; return false; }

function step(dt) {
  const n = ballCount;
  const k_spring = cfg.spring, k_col = cfg.collide, r = cfg.interact;
  const L0 = cfg.bondLen * r, minDist = 2 * r, cell = minDist;
  force.fill(0, 0, n * 3);

  // Springs along undirected bonds (each ball handles its own incident bonds).
  for (let i = 0; i < n; i++) {
    for (let k = 0; k < MAX_NBR; k++) {
      const j = nbr[i * MAX_NBR + k];
      if (j < 0) continue;
      const dx = pos[j * 3] - pos[i * 3], dy = pos[j * 3 + 1] - pos[i * 3 + 1], dz = pos[j * 3 + 2] - pos[i * 3 + 2];
      const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
      const scale = dist > 1e-9 ? k_spring * (dist - L0) / dist : 0;
      force[i * 3] += scale * dx; force[i * 3 + 1] += scale * dy; force[i * 3 + 2] += scale * dz;
    }
  }

  // Collisions: spatial-hash broad phase; skip directly-bonded pairs.
  hashGrid.clear();
  for (let i = 0; i < n; i++) {
    const key = gridKey(Math.floor(pos[i * 3] / cell), Math.floor(pos[i * 3 + 1] / cell), Math.floor(pos[i * 3 + 2] / cell));
    let bucket = hashGrid.get(key); if (!bucket) { bucket = []; hashGrid.set(key, bucket); }
    bucket.push(i);
  }
  for (let i = 0; i < n; i++) {
    const cx = Math.floor(pos[i * 3] / cell), cy = Math.floor(pos[i * 3 + 1] / cell), cz = Math.floor(pos[i * 3 + 2] / cell);
    for (let gx = -1; gx <= 1; gx++) for (let gy = -1; gy <= 1; gy++) for (let gz = -1; gz <= 1; gz++) {
      const bucket = hashGrid.get(gridKey(cx + gx, cy + gy, cz + gz));
      if (!bucket) continue;
      for (let b = 0; b < bucket.length; b++) {
        const j = bucket[b];
        if (j <= i) continue;
        const dx = pos[j * 3] - pos[i * 3], dy = pos[j * 3 + 1] - pos[i * 3 + 1], dz = pos[j * 3 + 2] - pos[i * 3 + 2];
        const d2 = dx * dx + dy * dy + dz * dz;
        if (d2 < 1e-12 || d2 >= minDist * minDist) continue;
        if (isBonded(i, j)) continue;
        const dist = Math.sqrt(d2), inv = 1 / dist, overlap = minDist - dist;
        const fx = -k_col * overlap * dx * inv, fy = -k_col * overlap * dy * inv, fz = -k_col * overlap * dz * inv;
        force[i * 3] += fx; force[i * 3 + 1] += fy; force[i * 3 + 2] += fz;
        force[j * 3] -= fx; force[j * 3 + 1] -= fy; force[j * 3 + 2] -= fz;
      }
    }
  }

  // Seek thrust: a steady pull toward each swimmer's bind target.
  for (let e = 0; e < activeList.length; e++) {
    const i = activeList[e], t = seekTarget[i];
    if (t < 0 || t >= n) continue;
    const dx = pos[t * 3] - pos[i * 3], dy = pos[t * 3 + 1] - pos[i * 3 + 1], dz = pos[t * 3 + 2] - pos[i * 3 + 2];
    const d = Math.sqrt(dx * dx + dy * dy + dz * dz);
    if (d > 1e-6) { const s = SWIM_ACCEL / d; force[i * 3] += s * dx; force[i * 3 + 1] += s * dy; force[i * 3 + 2] += s * dz; }
  }

  if (cfg.jiggle > 0) { const j = cfg.jiggle; for (let i = 0; i < n * 3; i++) force[i] += (Math.random() * 2 - 1) * j; }

  if (cfg.containK > 0) {
    const R = cfg.containR, kC = cfg.containK;
    for (let i = 0; i < n; i++) {
      const o = i * 3, x = pos[o], y = pos[o + 1], z = pos[o + 2];
      const d = Math.sqrt(x * x + y * y + z * z);
      if (d > R) { const s = -kC * (d - R) / d; force[o] += s * x; force[o + 1] += s * y; force[o + 2] += s * z; }
    }
  }

  const damp = cfg.damp;
  for (let i = 0; i < n * 3; i++) { vel[i] = (vel[i] + force[i] * dt) * damp; pos[i] += vel[i] * dt; }
}

function recenter() {
  const n = ballCount; if (!n) return;
  let cx = 0, cy = 0, cz = 0;
  for (let i = 0; i < n; i++) { cx += pos[i * 3]; cy += pos[i * 3 + 1]; cz += pos[i * 3 + 2]; }
  cx /= n; cy /= n; cz /= n;
  for (let i = 0; i < n; i++) { pos[i * 3] -= cx; pos[i * 3 + 1] -= cy; pos[i * 3 + 2] -= cz; }
}

// ---------------------------------------------------------------------------
// Rendering sync
// ---------------------------------------------------------------------------
function syncInstances() {
  const n = ballCount;
  instMesh.count = n;
  const s = cfg.radius;
  const m = instMesh.instanceMatrix.array;
  for (let i = 0; i < n; i++) {
    const o = i * 16, b = i * 3;
    m[o] = s;   m[o+1] = 0; m[o+2] = 0;  m[o+3] = 0;
    m[o+4] = 0; m[o+5] = s; m[o+6] = 0;  m[o+7] = 0;
    m[o+8] = 0; m[o+9] = 0; m[o+10] = s; m[o+11] = 0;
    m[o+12] = pos[b]; m[o+13] = pos[b+1]; m[o+14] = pos[b+2]; m[o+15] = 1;
  }
  instMesh.instanceMatrix.needsUpdate = true;

  if (colorsDirty) {
    for (let i = 0; i < n; i++) { tmpColor.copy(kindColor(kindList[kindId[i]])); instMesh.setColorAt(i, tmpColor); }
    if (instMesh.instanceColor) instMesh.instanceColor.needsUpdate = true;
    colorsDirty = false;
  }
}

function rebuildBondLines() {
  if (bondLines) { simGroup.remove(bondLines); bondLines.geometry.dispose(); bondLines.material.dispose(); bondLines = null; }
  if (!cfg.showBonds) return;
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(MAX_BALLS * MAX_NBR * 3), 3));
  bondLines = new THREE.LineSegments(geo, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 }));
  bondLines.frustumCulled = false;
  simGroup.add(bondLines);
}
function syncBondLines() {
  if (!bondLines) return;
  const arr = bondLines.geometry.attributes.position.array;
  let s = 0;
  for (let i = 0; i < ballCount; i++) for (let k = 0; k < MAX_NBR; k++) {
    const j = nbr[i * MAX_NBR + k];
    if (j <= i) continue;                    // each undirected bond once
    arr[s++] = pos[i*3]; arr[s++] = pos[i*3+1]; arr[s++] = pos[i*3+2];
    arr[s++] = pos[j*3]; arr[s++] = pos[j*3+1]; arr[s++] = pos[j*3+2];
  }
  bondLines.geometry.setDrawRange(0, s / 3);
  bondLines.geometry.attributes.position.needsUpdate = true;
}

// Stats: total balls, molecules (connected components over nbr), bonds, per-kind counts.
const uf = new Int32Array(MAX_BALLS);
const ballCountEl = document.getElementById('ballCount');
const molCountEl = document.getElementById('molCount');
const bondCountEl = document.getElementById('bondCount');
let kindCountEls = [];
function refreshCounts() {
  const n = ballCount;
  for (let i = 0; i < n; i++) uf[i] = i;
  const find = x => { while (uf[x] !== x) { uf[x] = uf[uf[x]]; x = uf[x]; } return x; };
  let bonds = 0;
  for (let i = 0; i < n; i++) for (let k = 0; k < MAX_NBR; k++) {
    const j = nbr[i * MAX_NBR + k];
    if (j > i) { bonds++; const ri = find(i), rj = find(j); if (ri !== rj) uf[ri] = rj; }
  }
  let mol = 0; for (let i = 0; i < n; i++) if (find(i) === i) mol++;
  const counts = new Int32Array(kindList.length);
  for (let i = 0; i < n; i++) counts[kindId[i]]++;
  ballCountEl.textContent = n; molCountEl.textContent = mol; bondCountEl.textContent = bonds;
  for (let k = 0; k < kindCountEls.length; k++) if (kindCountEls[k]) kindCountEls[k].textContent = counts[k] || 0;
}

// Build the legend (one row per defined kind) after a program is parsed.
function buildLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = '';
  kindCountEls = [];
  if (!kindList.length) { el.innerHTML = '<div class="note">No kinds parsed.</div>'; return; }
  for (let k = 0; k < kindList.length; k++) {
    const name = kindList[k];
    const row = document.createElement('div'); row.className = 'lrow';
    const sw = document.createElement('span'); sw.className = 'sw'; sw.style.background = '#' + kindColor(name).getHexString();
    const nm = document.createElement('span'); nm.className = 'nm'; nm.textContent = name;
    const ct = document.createElement('span'); ct.className = 'ct'; ct.textContent = '0';
    row.appendChild(sw); row.appendChild(nm); row.appendChild(ct);
    el.appendChild(row);
    kindCountEls[k] = ct;
  }
}

// ---------------------------------------------------------------------------
// WebGPU physics engine (optional; mirrors the CPU step). Springs run along the
// undirected `nbr` adjacency; collisions skip directly-bonded pairs; a seek force
// pulls swimmers toward `seekTarget`. The CPU runs the VM each frame and re-uploads
// changed bonds / seek targets; positions are read back for rendering and the VM.
// ---------------------------------------------------------------------------
const GRID_CAP = 64, CELL_CAP = 64;
const WORLD_MIN = -80, WORLD_SIZE = 160;
const GPU_RECENTER_INTERVAL = 30;
let gpu = null, gpuTick = 0;

const PHYS_WGSL = /* wgsl */`
struct Params {
  n: u32, gridDim: u32, maxNbr: u32, frameSeed: u32,
  dt: f32, kSpring: f32, kCol: f32, interact: f32,
  minDist: f32, jiggle: f32, damp: f32, restLen: f32,
  cellSize: f32, worldMin: f32, cellCap: u32, containR: f32,
  containK: f32, swimAccel: f32, pad0: f32, pad1: f32,
};
@group(0) @binding(0) var<uniform> P: Params;
@group(0) @binding(1) var<storage, read_write> pos: array<f32>;
@group(0) @binding(2) var<storage, read_write> vel: array<f32>;
@group(0) @binding(3) var<storage, read_write> force: array<f32>;
@group(0) @binding(4) var<storage, read_write> cellCount: array<atomic<u32>>;
@group(0) @binding(5) var<storage, read_write> cellItems: array<u32>;
@group(0) @binding(6) var<storage, read> nbrb: array<i32>;
@group(0) @binding(7) var<storage, read> seekb: array<i32>;

fn pv(i: u32) -> vec3<f32> { return vec3<f32>(pos[3u*i], pos[3u*i+1u], pos[3u*i+2u]); }
fn springForce(d: vec3<f32>) -> vec3<f32> { let l = length(d); if (l < 1e-6) { return vec3<f32>(0.0); } return (P.kSpring * (l - P.restLen) / l) * d; }
fn axis(v: f32) -> i32 { return clamp(i32(floor((v - P.worldMin) / P.cellSize)), 0, i32(P.gridDim) - 1); }
fn hash1(s: u32) -> f32 { var x = s * 747796405u + 2891336453u; x = ((x >> ((x >> 28u) + 4u)) ^ x) * 277803737u; x = (x >> 22u) ^ x; return f32(x) / 4294967296.0; }
fn isNbr(i: u32, j: u32) -> bool { for (var s = 0u; s < P.maxNbr; s = s + 1u) { let b = nbrb[i*P.maxNbr+s]; if (b >= 0 && u32(b) == j) { return true; } } return false; }

@compute @workgroup_size(64) fn clearGrid(@builtin(global_invocation_id) g: vec3<u32>) {
  let i = g.x; if (i >= arrayLength(&cellCount)) { return; }
  atomicStore(&cellCount[i], 0u);
}
@compute @workgroup_size(64) fn buildGrid(@builtin(global_invocation_id) g: vec3<u32>) {
  let i = g.x; if (i >= P.n) { return; }
  let p = pv(i);
  let c = (u32(axis(p.z))*P.gridDim + u32(axis(p.y)))*P.gridDim + u32(axis(p.x));
  let slot = atomicAdd(&cellCount[c], 1u);
  if (slot < P.cellCap) { cellItems[c * P.cellCap + slot] = i; }
}
@compute @workgroup_size(64) fn computeForces(@builtin(global_invocation_id) g: vec3<u32>) {
  let i = g.x; let n = P.n; if (i >= n) { return; }
  let pi = pv(i); var f = vec3<f32>(0.0);
  for (var s = 0u; s < P.maxNbr; s = s + 1u) { let b = nbrb[i*P.maxNbr+s]; if (b >= 0) { f += springForce(pv(u32(b)) - pi); } }
  let cx = axis(pi.x); let cy = axis(pi.y); let cz = axis(pi.z); let gd = i32(P.gridDim); let md2 = P.minDist * P.minDist;
  for (var oz = -1; oz <= 1; oz++) { let zz = clamp(cz + oz, 0, gd - 1);
    for (var oy = -1; oy <= 1; oy++) { let yy = clamp(cy + oy, 0, gd - 1);
      for (var ox = -1; ox <= 1; ox++) { let xx = clamp(cx + ox, 0, gd - 1);
        let cid = (u32(zz)*P.gridDim + u32(yy))*P.gridDim + u32(xx);
        let cnt = min(atomicLoad(&cellCount[cid]), P.cellCap);
        for (var s = 0u; s < cnt; s = s + 1u) {
          let j = cellItems[cid * P.cellCap + s];
          if (j == i) { continue; }
          let diff = pv(j) - pi; let d2 = dot(diff, diff);
          if (d2 < 1e-12 || d2 >= md2) { continue; }
          if (isNbr(i, j)) { continue; }
          let dist = sqrt(d2);
          f += (P.kCol * (P.minDist - dist) / dist) * (-diff);
        }
      }
    }
  }
  if (P.jiggle > 0.0) {
    let r = vec3<f32>(hash1(3u*i + P.frameSeed), hash1(3u*i + 1u + P.frameSeed*7u), hash1(3u*i + 2u + P.frameSeed*13u)) * 2.0 - 1.0;
    f += r * P.jiggle;
  }
  let st = seekb[i];
  if (st >= 0) { let d = pv(u32(st)) - pi; let l = length(d); if (l > 1e-6) { f += (P.swimAccel / l) * d; } }
  if (P.containK > 0.0) { let d = length(pi); if (d > P.containR) { f += (-P.containK * (d - P.containR) / d) * pi; } }
  force[3u*i] = f.x; force[3u*i+1u] = f.y; force[3u*i+2u] = f.z;
}
@compute @workgroup_size(64) fn integrate(@builtin(global_invocation_id) g: vec3<u32>) {
  let i = g.x; if (i >= P.n) { return; }
  let b = 3u*i;
  var v = vec3<f32>(vel[b], vel[b+1u], vel[b+2u]);
  let fo = vec3<f32>(force[b], force[b+1u], force[b+2u]);
  var p = vec3<f32>(pos[b], pos[b+1u], pos[b+2u]);
  v = (v + fo * P.dt) * P.damp;
  p += v * P.dt;
  pos[b]=p.x; pos[b+1u]=p.y; pos[b+2u]=p.z;
  vel[b]=v.x; vel[b+1u]=v.y; vel[b+2u]=v.z;
}`;

async function createGPUEngine() {
  if (!('gpu' in navigator)) return null;
  try {
    const adapter = await navigator.gpu.requestAdapter({ powerPreference: 'high-performance' });
    if (!adapter) return null;
    const device = await adapter.requestDevice();
    device.addEventListener && device.addEventListener('uncapturederror', ev => console.error('WebGPU error:', ev.error && ev.error.message));

    const numCells = GRID_CAP * GRID_CAP * GRID_CAP;
    const fbytes = MAX_BALLS * 3 * 4;
    const U = GPUBufferUsage;
    const mk = (size, usage) => device.createBuffer({ size, usage });
    const paramsBuf    = mk(96, U.UNIFORM | U.COPY_DST);
    const posBuf       = mk(fbytes, U.STORAGE | U.COPY_SRC | U.COPY_DST);
    const velBuf       = mk(fbytes, U.STORAGE | U.COPY_DST);
    const forceBuf     = mk(fbytes, U.STORAGE);
    const cellCountBuf = mk(numCells * 4, U.STORAGE);
    const cellItemsBuf = mk(numCells * CELL_CAP * 4, U.STORAGE);
    const nbrBuf       = mk(MAX_BALLS * MAX_NBR * 4, U.STORAGE | U.COPY_DST);
    const seekBuf      = mk(MAX_BALLS * 4, U.STORAGE | U.COPY_DST);
    const posStaging   = mk(fbytes, U.MAP_READ | U.COPY_DST);

    const module = device.createShaderModule({ code: PHYS_WGSL });
    if (module.getCompilationInfo) {
      const info = await module.getCompilationInfo();
      for (const m of info.messages) if (m.type === 'error') console.error('WGSL', m.lineNum + ':' + m.linePos, m.message);
    }
    const bgl = device.createBindGroupLayout({ entries: [0,1,2,3,4,5,6,7].map(binding => ({
      binding, visibility: GPUShaderStage.COMPUTE,
      buffer: { type: binding === 0 ? 'uniform' : (binding >= 6 ? 'read-only-storage' : 'storage') },
    })) });
    const pl = device.createPipelineLayout({ bindGroupLayouts: [bgl] });
    const pipe = ep => device.createComputePipeline({ layout: pl, compute: { module, entryPoint: ep } });
    const pipes = { clear: pipe('clearGrid'), build: pipe('buildGrid'), forces: pipe('computeForces'), integrate: pipe('integrate') };
    const bind = device.createBindGroup({ layout: bgl,
      entries: [paramsBuf, posBuf, velBuf, forceBuf, cellCountBuf, cellItemsBuf, nbrBuf, seekBuf].map((buffer, binding) => ({ binding, resource: { buffer } })) });

    const pbuf = new ArrayBuffer(96);
    const pu = new Uint32Array(pbuf), pf = new Float32Array(pbuf);
    let frame = 0;
    const wg = x => Math.max(1, Math.ceil(x / 64));

    function writeParams(n, seed) {
      const r = cfg.interact, minDist = 2 * r;
      let cellSize = minDist;
      let gridDim = Math.ceil(WORLD_SIZE / cellSize);
      if (gridDim > GRID_CAP) { gridDim = GRID_CAP; cellSize = WORLD_SIZE / gridDim; }
      pu[0] = n; pu[1] = gridDim; pu[2] = MAX_NBR; pu[3] = seed >>> 0;
      pf[4] = 0.18; pf[5] = cfg.spring; pf[6] = cfg.collide; pf[7] = r;
      pf[8] = minDist; pf[9] = cfg.jiggle; pf[10] = cfg.damp; pf[11] = cfg.bondLen * r;
      pf[12] = cellSize; pf[13] = WORLD_MIN; pu[14] = CELL_CAP; pf[15] = cfg.containR;
      pf[16] = cfg.containK; pf[17] = SWIM_ACCEL; pf[18] = 0; pf[19] = 0;
      device.queue.writeBuffer(paramsBuf, 0, pbuf);
    }
    function stepGPU(n, substeps) {
      for (let s = 0; s < substeps; s++) {
        writeParams(n, frame * 31 + s);
        const enc = device.createCommandEncoder();
        const dispatch = (pipeline, count) => { const pass = enc.beginComputePass(); pass.setPipeline(pipeline); pass.setBindGroup(0, bind); pass.dispatchWorkgroups(wg(count)); pass.end(); };
        dispatch(pipes.clear, numCells);
        dispatch(pipes.build, n);
        dispatch(pipes.forces, n);
        dispatch(pipes.integrate, n);
        device.queue.submit([enc.finish()]);
      }
      frame++;
    }
    async function readPositions(n) {
      const len = n * 3 * 4;
      const enc = device.createCommandEncoder();
      enc.copyBufferToBuffer(posBuf, 0, posStaging, 0, len);
      device.queue.submit([enc.finish()]);
      await posStaging.mapAsync(GPUMapMode.READ, 0, len);
      pos.set(new Float32Array(posStaging.getMappedRange(0, len)));
      posStaging.unmap();
    }
    return {
      device, step: stepGPU, readPositions,
      uploadAll(n) {
        device.queue.writeBuffer(posBuf, 0, pos, 0, n * 3);
        device.queue.writeBuffer(velBuf, 0, vel, 0, n * 3);
        device.queue.writeBuffer(nbrBuf, 0, nbr, 0, n * MAX_NBR);
        device.queue.writeBuffer(seekBuf, 0, seekTarget, 0, n);
      },
      uploadBonds(n) { device.queue.writeBuffer(nbrBuf, 0, nbr, 0, n * MAX_NBR); },
      uploadSeek(n) { device.queue.writeBuffer(seekBuf, 0, seekTarget, 0, n); },
      uploadPositions(n) { device.queue.writeBuffer(posBuf, 0, pos, 0, n * 3); },   // recenter only shifts positions; GPU keeps the authoritative velocities
    };
  } catch (e) {
    console.warn('WebGPU unavailable, using CPU physics:', e);
    return null;
  }
}

// ---------------------------------------------------------------------------
// Main loop
// ---------------------------------------------------------------------------
let lastT = performance.now();
let fpsAccum = 0, fpsFrames = 0;
const fpsEl = document.getElementById('fps');

let physicsBusy = false;
async function runPhysics() {
  if (physicsBusy || cfg.paused || !ballCount) return;
  physicsBusy = true;
  try {
    const now = performance.now();
    if (gpu) {
      if (gpuBondsDirty) { gpu.uploadBonds(ballCount); gpuBondsDirty = false; }
      if (seekDirtyForGPU) { gpu.uploadSeek(ballCount); seekDirtyForGPU = false; }
      gpu.step(ballCount, cfg.substeps);
      await gpu.readPositions(ballCount);
      let didRecenter = false;
      if (++gpuTick >= GPU_RECENTER_INTERVAL) { gpuTick = 0; recenter(); didRecenter = true; }
      updatePrograms(now);
      if (didRecenter) gpu.uploadPositions(ballCount);
    } else {
      const dt = 0.18;
      for (let s = 0; s < cfg.substeps; s++) step(dt);
      recenter();
      updatePrograms(now);
    }
    if (statsDirty) { refreshCounts(); statsDirty = false; }
  } catch (e) {
    console.error('GPU physics failed, falling back to CPU:', e);
    gpu = null;
    document.getElementById('mode').textContent = 'CPU (gpu error)';
  } finally {
    physicsBusy = false;
  }
}

function animate() {
  const now = performance.now();
  const frameDt = Math.min((now - lastT) / 1000, 0.05);
  lastT = now;

  runPhysics();                        // fire-and-forget: never blocks this frame's render

  syncInstances();
  syncBondLines();
  controls.update();
  renderer.render(scene, camera);

  fpsAccum += frameDt; fpsFrames++;
  if (fpsAccum >= 0.5) { fpsEl.textContent = Math.round(fpsFrames / fpsAccum); fpsAccum = 0; fpsFrames = 0; }
}

// ---------------------------------------------------------------------------
// Program loading
// ---------------------------------------------------------------------------
async function loadProgram() {
  let src = null;
  try {
    const r = await fetch('copy.prog', { cache: 'no-store' });
    if (r.ok) src = await r.text();
  } catch (_) { /* file:// or missing — fall back below */ }
  if (src == null) { console.warn('Could not fetch copy.prog; using the embedded default program.'); src = DEFAULT_PROG; }
  try {
    parseProgram(src);
  } catch (e) {
    console.error('Program parse error:', e.message);
    document.getElementById('legend').innerHTML = '<div class="note">Parse error: ' + e.message + '</div>';
    return false;
  }
  buildLegend();
  populateScenarios();
  console.log(`Parsed ${kindList.length} kinds, ${scenarios.size} scenarios:`, [...scenarios.keys()]);
  return true;
}
function populateScenarios() {
  const sel = document.getElementById('scenario');
  const prev = sel.value;
  sel.innerHTML = '';
  for (const name of scenarios.keys()) {
    const opt = document.createElement('option'); opt.value = name; opt.textContent = name; sel.appendChild(opt);
  }
  if (scenarios.has(prev)) sel.value = prev;
}

bindSlider('containK', 'containK', v => v.toFixed(3));

bindSlider('collide', 'collide', v => v.toFixed(2));

// Boot

(async () => {
  updateContainSphere();
  gpu = await createGPUEngine();
  const modeEl = document.getElementById('mode');
  if (modeEl) modeEl.textContent = gpu ? 'GPU' : 'CPU';
  await loadProgram();
  const sel = document.getElementById('scenario');
  if (sel.value) spawnScenario(sel.value);
  lastT = performance.now();
  renderer.setAnimationLoop(animate);
})();

// Debug handle for automated testing.
window.__dbg = {
  cfg, instMesh, camera, controls,
  get pos() { return pos; },
  get n() { return ballCount; },
  get kindId() { return kindId; },
  get stateId() { return stateId; },
  get bond() { return bond; },
  get nbr() { return nbr; },
  get seekTarget() { return seekTarget; },
  get kindList() { return kindList; },
  get slotNames() { return slotNames; },
  scenarios() { return [...scenarios.keys()]; },
  spawn(name) { spawnScenario(name); },
  get gpu() { return !!gpu; },
  tick() { return runPhysics(); },          // drive one physics+VM frame (used by tests)
  kindCount(name) { let c = 0; const k = kindIndex.get(name); for (let i = 0; i < ballCount; i++) if (kindId[i] === k) c++; return c; },
  molecules() {
    for (let i = 0; i < ballCount; i++) uf[i] = i;
    const find = x => { while (uf[x] !== x) { uf[x] = uf[uf[x]]; x = uf[x]; } return x; };
    for (let i = 0; i < ballCount; i++) for (let k = 0; k < MAX_NBR; k++) { const j = nbr[i * MAX_NBR + k]; if (j > i) { const ri = find(i), rj = find(j); if (ri !== rj) uf[ri] = rj; } }
    let m = 0; for (let i = 0; i < ballCount; i++) if (find(i) === i) m++; return m;
  },
};

// ---------------------------------------------------------------------------
// Embedded fallback program (used only if copy.prog cannot be fetched, e.g.
// when the page is opened via file:// instead of a static server). The canonical
// source is copy.prog in the repo.
// ---------------------------------------------------------------------------
const DEFAULT_PROG = `
ball Blank {};

ball Chain {};
ball Cap: Chain { next: Info; };
ball Info: Chain { next: Info | End; prev: Cap | Info; };
ball Info_1 : Info {};
ball Info_2 : Info {};
ball Info_3 : Info {};
ball End: Chain { prev: Info; };

ball Polymerase {
  original: Chain;
  material: Blank;
  copy: Chain;
  {
    start:
    original = Cap;
    material = Blank;
    material.kind = original.kind;
    copy = material;

    clone:
    original = original.next;
    material = Blank;
    material.kind = original.kind;
    copy.next = material;
    material.prev = copy;
    copy = material;
    if (copy.kind != End) go clone;

    original = release;
    material = release;
    copy = release;
    go start;
  }
};

ball Monomerase {
  bond chain: End;
  bond prev: Chain;
  {
    start:
    chain = End;

    split:
    prev = chain.prev;
    chain.prev = release;
    prev.next = release;
    chain = prev;
    if (chain.kind != Cap) go split;

    chain = release;
    prev = release;
    sleep 5s;
    go start;
  }
};

scenario Test {
  Blank * 1000;
  Polymerase;
  chain = Cap;
  chain.next = Info_1;
  chain = chain.next;
  chain.next = Info_2;
  chain = chain.next;
  chain.next = Info_3;
  chain = chain.next;
  chain.next = End;
};

scenario TestWithMonomerase {
  Blank * 1000;
  Polymerase * 3;
  Monomerase;
  chain = Cap;
  chain.next = Info_1; chain.next.prev = chain; chain = chain.next;
  chain.next = Info_2; chain.next.prev = chain; chain = chain.next;
  chain.next = Info_3; chain.next.prev = chain; chain = chain.next;
  chain.next = Info_1; chain.next.prev = chain; chain = chain.next;
  chain.next = Info_2; chain.next.prev = chain; chain = chain.next;
  chain.next = Info_3; chain.next.prev = chain; chain = chain.next;
  chain.next = End;    chain.next.prev = chain;
};
`;
